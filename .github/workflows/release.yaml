name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version - in the form of v1.2.3'
        required: true
        type: string

env:
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'DefaultProjectName' }}  
  ITCH_TARGET: ${{ vars.ITCH_TARGET }}
  PROJECT_PATH: ${{ vars.PROJECT_PATH }}
  UNITY_VERSION: 6000.4.0f1

jobs:
  get-version:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    outputs:
      version: ${{ inputs.version || steps.tag.outputs.tag }}
  
  strip-version:
    needs:
        get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Strip version
        id: strip-version
        run: |
          VERSION_STRIPPED="${VERSION:1}"
          echo "version-stripped=$VERSION_STRIPPED" >> "$GITHUB_OUTPUT"
    outputs:
      version-stripped: ${{ steps.strip-version.outputs.version-stripped }}
  
  build:
    needs:
      - get-version
      - strip-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
      VERSION_STRIPPED: ${{ needs.strip-version.outputs.version-stripped }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: web
            target: WebGL
            package_ext: .zip
            runner: ubuntu-latest

          - platform: windows
            target: StandaloneWindows64
            package_ext: .zip
            runner: windows-latest

          - platform: linux
            target: StandaloneLinux64
            package_ext: .zip
            runner: ubuntu-latest
          
          - platform: macos
            target: StandaloneOSX
            package_ext: .dmg
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Set up environment
        run: |
          PACKAGE="${PROJECT_NAME}-${{ matrix.platform }}${{ matrix.package_ext }}"
          echo "package=$PACKAGE" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-${{ matrix.target }}
          restore-keys: |
            Library-

      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }} 
          targetPlatform: ${{ matrix.target }}
          buildsPath: tmp/build
          buildName: ${{ env.PROJECT_NAME }}
          versioning: Custom
          version: ${{ env.VERSION_STRIPPED }}

      # - name: FakeBuild (non-Windows)
      #   if: ${{ matrix.platform != 'windows' }}
      #   run: |
      #     mkdir -p tmp/build/${{ matrix.target }}
      #     echo 'This is a test' >> tmp/build/${{ matrix.target }}/hello.txt
      
      # - name: FakeBuild (Windows)
      #   if: matrix.platform == 'windows'
      #   shell: pwsh
      #   run: |
      #     New-Item -ItemType Directory -Path tmp/build/${{ matrix.target }} -Force
      #     "This is a test" | Out-File -FilePath tmp/build/${{ matrix.target }}/hello.txt -Append

      - name: Package app (non-Windows)
        if: ${{ matrix.platform != 'windows' }}
        working-directory: tmp/build
        run: |
          if [ '${{ matrix.platform }}' = 'macos' ]; then
            ln -s /Applications .
            hdiutil create -fs HFS+ -volname '${{ env.PROJECT_NAME }}' -srcfolder '${{ matrix.target }}' '${{ env.package }}'
          else
            ls -l .
            sudo chmod -R u+rwX .
            ls -l .
            sudo zip --recurse-paths '${{ env.package }}' '${{ matrix.target }}'
          fi

      - name: Package app (Windows)
        if: matrix.platform == 'windows'
        working-directory: tmp/build
        shell: pwsh
        run: Compress-Archive -Path '${{ matrix.target }}' -DestinationPath '${{ env.package }}'

      - name: Upload package to artifacts
        uses: actions/upload-artifact@v4
        with:
          path: tmp/build/${{ matrix.target }}
          name: package-${{ matrix.platform }}
          retention-days: 1

      - name: Upload package to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: tmp/build/${{ env.package }}
          asset_name: ${{ env.package }} 
          release_name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          overwrite: true
                
  # Upload all packages to itch.io.
  upload-to-itch:
    runs-on: ubuntu-latest
    needs:
      - get-version
      - build
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: tmp

      - name: Install butler
        run: |
          curl -L -o butler.zip 'https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default'
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Upload all packages to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          for channel in $(ls tmp); do
            echo "$channel"
            ls tmp/${channel}
            ./butler push \
              --fix-permissions \
              --userversion='${{ needs.get-version.outputs.version }}' \
              tmp/"${channel}"/* \
              '${{ env.ITCH_TARGET }}':"${channel#package-}"
          done