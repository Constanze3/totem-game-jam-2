name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version - in the form of v1.2.3'
        required: true
        type: string

env:
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'DefaultProjectName' }}  
  ITCH_TARGET: ${{ vars.ITCH_TARGET }}
  PROJECT_PATH: ${{ vars.PROJECT_PATH }}

jobs:
  get-version:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    outputs:
      version: ${{ inputs.version || steps.tag.outputs.tag }}
  
  # Create Windows build.
  build-standalone-windows64:
    needs:
      - get-version
    env:
      VERSION: ${{needs.get-version.outputs.version }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-${{ env.PROJECT_PATH }}-StandaloneWindows64
          restore-keys: |
            Library-${{ env.PROJECT_PATH }}-StandaloneWindows64
            Library-

      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: Game
          unityVersion: 6000.4.0f1
          targetPlatform: StandaloneWindows64
          buildsPath: tmp/build
          buildName: ${{ env.PROJECT_NAME }}
          versioning: Custom
          version: ${{ env.VERSION }}

      - name: Finish package
        working-directory: tmp/build
        shell: pwsh
        run: Compress-Archive -Path ${{ env.PROJECT_NAME }}-DestinationPath 'build.zip'

      - name: Upload package to artifacts
        uses: actions/upload-artifact@v4
        with:
          path: tmp/build.zip
          name: package-windows
          retention-days: 1

      - name: Upload package to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: tmp/build.zip
          asset_name: ${{ env.PROJECT_NAME }}-windows.zip
          release_name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          overwrite: true

  # Upload all packages to itch.io.
  upload-to-itch:
    runs-on: ubuntu-latest
    needs:
      - get-version
      - build-standalone-windows64
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: tmp

      - name: Install butler
        run: |
          curl -L -o butler.zip 'https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default'
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Upload all packages to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          for channel in $(ls tmp); do
            ./butler push \
              --fix-permissions \
              --userversion='${{ needs.get-version.outputs.version }}' \
              tmp/"${channel}"/* \
              '${{ secrets.ITCH_TARGET }}':"${channel#package-}"
          done